<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LegalUZ — Yuridik Platforma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; font-weight: 700; color: #FFD700; margin-bottom: 0.5rem; }
    p.sub { font-size: 1.1rem; color: #a0b4d0; margin-bottom: 2rem; text-align: center; }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      max-width: 900px;
      width: 100%;
      margin-bottom: 2rem;
    }
    .feature {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
    }
    .feature .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .feature h3 { font-size: 0.95rem; color: #e0eaff; }
    .btn {
      background: #FFD700;
      color: #0a1628;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 0.9rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    footer { margin-top: 2rem; color: #5a7a9a; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="logo">⚖️</div>
  <h1>LegalUZ</h1>
  <p class="sub">O'zbekistondagi yuristlar va mijozlarni birlashtiruvchi<br>professional yuridik platforma</p>

  <div class="features">
    <div class="feature"><div class="icon">📢</div><h3>Elon joylash</h3></div>
    <div class="feature"><div class="icon">🤖</div><h3>AI Konsultatsiya</h3></div>
    <div class="feature"><div class="icon">⚖️</div><h3>Huquqiy tushuntirish</h3></div>
    <div class="feature"><div class="icon">✍️</div><h3>Hujjat tuzib berish</h3></div>
    <div class="feature"><div class="icon">📁</div><h3>Hujjat namunalari</h3></div>
    <div class="feature"><div class="icon">👨‍💼</div><h3>Admin panel</h3></div>
  </div>

  <a class="btn" href="https://t.me/Yuristim_bot">🚀 Botga o'tish</a>
  <footer>© 2025 LegalUZ · @Yuristim_bot</footer>
</body>
</html>
