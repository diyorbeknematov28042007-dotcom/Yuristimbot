services:
  - type: web
    name: yuristim-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: "npm install && ./node_modules/.bin/pnpm install && ./node_modules/.bin/pnpm build"
    startCommand: "node --enable-source-maps artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_VERSION
        value: "20.12.7"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/healthz
